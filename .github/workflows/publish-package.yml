name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Release tags must be created from main."
            exit 1
          fi

      - name: Resolve version tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
            exit 1
          fi

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read package metadata
        id: package
        run: |
          PACKAGE_NAME=$(node -p 'require("./package.json").name')
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@kwtechnologies"
          cache: pnpm

      - name: Check whether version is already published
        id: published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.published.outputs.exists != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: steps.published.outputs.exists != 'true'
        run: pnpm build

      - name: Skip publish when version already exists
        if: steps.published.outputs.exists == 'true'
        run: echo "Version ${{ steps.package.outputs.version }} is already published. Skipping publish."

      - name: Publish package
        if: steps.published.outputs.exists != 'true'
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
